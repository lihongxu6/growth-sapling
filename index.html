<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>成长小树苗 · 高保真视觉稿</title>
<style>
/* ===== Design Tokens (映射 design-spec §2) ===== */
:root{
  --green:#5CB85C; --green-light:#E8F5E9; --yellow:#F0AD4E; --blue:#5BC0DE;
  --bg:#FFF8F0; --card-bg:#FFFFFF; --text:#333333; --text-secondary:#888888;
  --border:#E8E0D8; --orange-tag:#FFF3E0; --danger:#E57373; --gold:#F4B400;
  --radius-sm:12px; --radius-md:16px; --radius-lg:24px; --radius-pill:999px;
  --shadow-card:0 1px 3px rgba(0,0,0,.05); --shadow-float:0 8px 24px rgba(0,0,0,.12);
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px; --sp-8:32px;
  --fs-display:56px; --fs-title:20px; --fs-card-title:15px; --fs-body:15px;
  --fs-caption:13px; --fs-aux:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,sans-serif;
  background:#EDE7DF; display:flex; justify-content:center; align-items:center;
  min-height:100vh; -webkit-tap-highlight-color:transparent; user-select:none; color:var(--text);
}
/* ===== Phone Frame ===== */
.phone-frame{
  width:375px; height:812px; background:var(--bg); border-radius:40px; overflow:hidden;
  position:relative; box-shadow:0 24px 70px rgba(0,0,0,.18),0 0 0 2px #2b2b2b;
  display:flex; flex-direction:column;
}
@media(max-width:480px){
  body{align-items:stretch; padding:0;}
  .phone-frame{width:100%; height:100vh; height:100dvh; border-radius:0; box-shadow:none;}
}
/* ===== Status Bar (顶部安全区，无品牌名/无假数据) ===== */
.status-bar{
  height:44px; flex-shrink:0; background:var(--bg);
}
/* ===== Splash 开屏页 ===== */
.splash{
  position:absolute; inset:0; z-index:70; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:var(--sp-3);
  transition:opacity .6s ease;
}
.splash.hide{opacity:0; pointer-events:none;}
.splash-logo{font-size:72px; animation:splashPop .6s ease;}
@keyframes splashPop{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
.splash-name{font-size:28px; font-weight:800; color:var(--green);}
.splash-slogan{font-size:var(--fs-caption); color:var(--text-secondary);}
/* ===== Content ===== */
.page-content{flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; scroll-behavior:smooth;}
.page-content::-webkit-scrollbar{display:none;}
.page{display:none; padding:0 var(--sp-4) var(--sp-5); animation:fadeIn .25s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ===== Home Header (sticky) ===== */
.home-header{
  position:sticky; top:0; z-index:10; background:var(--bg); margin:0 calc(-1*var(--sp-4));
  padding:var(--sp-2) var(--sp-4) var(--sp-3); display:flex; align-items:center; gap:var(--sp-3); justify-content:space-between;
}
.home-header>*{flex:1;}
.streak-fire{display:flex; align-items:center; gap:2px; font-weight:800; font-size:18px; color:var(--yellow);}
.fire-icon{font-size:22px;}
.fire-icon.lit{filter:drop-shadow(0 0 6px rgba(240,173,78,.7)); animation:flame 1.4s ease-in-out infinite alternate;}
@keyframes flame{from{transform:scale(1);}to{transform:scale(1.12) rotate(-3deg);}}
.star-count{text-align:center; font-weight:700; font-size:var(--fs-card-title); color:var(--gold);}
.date-display{display:flex; align-items:center; justify-content:flex-end; gap:4px; font-size:var(--fs-aux); font-weight:600; color:var(--text-secondary); background:var(--card-bg); border:1px solid var(--border); padding:6px 10px; border-radius:var(--radius-pill); min-height:44px;}
/* ===== Backfill banner ===== */
.backfill-banner{
  display:none; align-items:center; gap:6px; background:var(--orange-tag); color:var(--yellow);
  font-size:var(--fs-caption); font-weight:700; padding:10px var(--sp-4); border-radius:var(--radius-md);
  margin-bottom:var(--sp-3);
}
.backfill-banner.show{display:flex;}

/* ===== Task Card ===== */
.task-list{display:flex; flex-direction:column; gap:var(--sp-3);}
.task-card{
  display:flex; align-items:center; gap:var(--sp-3); background:var(--card-bg);
  border:1px solid var(--border); border-radius:var(--radius-md); padding:var(--sp-4);
  box-shadow:var(--shadow-card); cursor:pointer; min-height:64px; position:relative;
  transition:background .3s ease-out;
}
.task-card.completed{background:var(--green-light); border-color:transparent;}
.task-card.backfill{background:var(--orange-tag);}
.task-icon{font-size:26px; width:30px; text-align:center; flex-shrink:0;}
.task-name{font-size:var(--fs-card-title); font-weight:600; flex:1;}
.task-status{
  width:28px; height:28px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  border:2px solid var(--border); color:transparent; font-size:15px; font-weight:700;
}
.task-card.completed .task-status{background:var(--green); border-color:var(--green); color:#fff;}
.backfill-tag{
  position:absolute; top:-8px; right:14px; background:var(--yellow); color:#fff; font-size:11px;
  font-weight:700; padding:2px 8px; border-radius:var(--radius-pill); box-shadow:var(--shadow-card);
}
/* ===== Progress ===== */
.progress-wrap{margin-top:var(--sp-5);}
.progress-track{height:12px; background:#EFE7DC; border-radius:var(--radius-pill); overflow:hidden;}
.progress-fill{height:100%; background:linear-gradient(90deg,var(--green),#7CC47F); border-radius:var(--radius-pill); transition:width .4s ease;}
.progress-text{text-align:center; font-size:var(--fs-card-title); font-weight:700; margin-top:var(--sp-2);}

/* ===== Empty State ===== */
.empty-state{display:flex; flex-direction:column; align-items:center; text-align:center; padding:var(--sp-8) var(--sp-4); gap:var(--sp-3);}
.empty-state .squirrel{font-size:72px;}
.empty-title{font-size:var(--fs-title); font-weight:700;}
.empty-sub{font-size:var(--fs-caption); color:var(--text-secondary);}

/* ===== Buttons ===== */
.btn-primary{
  background:var(--green); color:#fff; border:none; border-radius:var(--radius-pill);
  font-size:var(--fs-card-title); font-weight:700; padding:14px 28px; box-shadow:var(--shadow-float);
  cursor:pointer; min-height:44px;
}
.btn-block{display:block; width:100%; margin-top:var(--sp-4);}

/* ===== Stats Page ===== */
.stats-header{position:sticky; top:0; z-index:10; background:var(--bg); margin:0 calc(-1*var(--sp-4)); padding:var(--sp-3) var(--sp-4); text-align:center; font-size:var(--fs-title); font-weight:700;}
.streak-block{text-align:center; padding:var(--sp-5) 0 var(--sp-4);}
.streak-num{font-size:var(--fs-display); font-weight:800; color:var(--yellow); line-height:1; filter:drop-shadow(0 2px 6px rgba(240,173,78,.3));}
.streak-label{font-size:var(--fs-card-title); font-weight:600; margin-top:6px;}
.streak-best{font-size:var(--fs-caption); color:var(--text-secondary); margin-top:4px;}
.card{background:var(--card-bg); border-radius:var(--radius-md); padding:var(--sp-4); box-shadow:var(--shadow-card); margin-top:var(--sp-4);}
.card-title{font-size:var(--fs-card-title); font-weight:700; margin-bottom:var(--sp-3);}
/* ring */
.ring-wrap{display:flex; align-items:center; gap:var(--sp-4);}
.ring{width:96px; height:96px; border-radius:50%; background:conic-gradient(var(--green) 0% 85%, #EFE7DC 85% 100%); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.ring-inner{width:74px; height:74px; border-radius:50%; background:var(--card-bg); display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:800; color:var(--green);}
.ring-desc{font-size:var(--fs-caption); color:var(--text-secondary);}
/* calendar heatmap */
.cal-month{font-size:var(--fs-aux); font-weight:700; color:var(--text-secondary); margin-bottom:8px;}
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.cal-cell{aspect-ratio:1; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--text-secondary);}
.cal-head{font-size:10px; color:var(--text-secondary); font-weight:700; aspect-ratio:1; display:flex; align-items:center; justify-content:center;}
.c-done{background:#7CC47F; cursor:pointer; color:#fff; font-weight:700;} .c-part{background:var(--yellow); cursor:pointer; color:#fff; font-weight:700;} .c-none{background:#E0E0E0; cursor:pointer; color:var(--text-secondary); font-weight:600;} .c-empty{background:transparent; color:var(--text-secondary);}
.c-today{outline:2px solid var(--green); outline-offset:-2px;}
/* badges */
.badge-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:var(--sp-3);}
.badge{display:flex; flex-direction:column; align-items:center; gap:4px; text-align:center; padding:var(--sp-2) 0; border-radius:var(--radius-sm);}
.badge-icon{font-size:30px; filter:grayscale(1); opacity:.5;}
.badge.earned .badge-icon{filter:none; opacity:1; text-shadow:0 0 8px rgba(244,180,0,.5);}
.badge-name{font-size:11px; font-weight:600; color:var(--text-secondary);}
.badge.earned .badge-name{color:var(--text);}
.badge-prog{font-size:10px; color:var(--text-secondary);}
.badge.locked .badge-icon{position:relative;}
.badge-reserved{opacity:.4;}

/* ===== Tasks Page ===== */
.tasks-header{position:sticky; top:0; z-index:10; background:var(--bg); margin:0 calc(-1*var(--sp-4)); padding:var(--sp-3) var(--sp-4); text-align:center; font-size:var(--fs-title); font-weight:700;}
.task-mgmt-list{display:flex; flex-direction:column; gap:var(--sp-3); margin-top:var(--sp-4);}
.tm-card{background:var(--card-bg); border-radius:var(--radius-md); padding:var(--sp-4); box-shadow:var(--shadow-card); display:flex; align-items:center; gap:var(--sp-3); min-height:64px;}
.tm-icon{font-size:26px; width:30px; text-align:center; flex-shrink:0;}
.tm-info{flex:1; min-width:0;}
.tm-name{font-size:var(--fs-card-title); font-weight:600;}
.tm-purpose{font-size:var(--fs-caption); color:var(--blue); font-style:italic; margin-top:3px;}
.tm-repeat{font-size:var(--fs-caption); color:var(--text-secondary); margin-top:2px;}
.tm-actions{display:flex; gap:8px; flex-shrink:0;}
.tm-btn{width:36px; height:36px; border-radius:50%; border:none; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; min-height:44px; min-width:44px;}
.tm-btn.edit{background:var(--green-light); color:var(--green);}
.tm-btn.del{background:#FFEBEE; color:var(--danger);}
.add-btn{
  position:sticky; bottom:var(--sp-4); margin-top:var(--sp-5); width:100%; background:var(--green);
  color:#fff; border:none; border-radius:var(--radius-pill); font-size:var(--fs-card-title); font-weight:700;
  padding:15px; box-shadow:var(--shadow-float); cursor:pointer; min-height:48px;
}

/* ===== Tab Bar ===== */
.tab-bar{display:flex; border-top:1px solid var(--border); background:var(--card-bg); flex-shrink:0; padding-bottom:env(safe-area-inset-bottom,8px);}
.tab-item{flex:1; display:flex; flex-direction:column; align-items:center; padding:8px 0 4px; cursor:pointer; font-size:11px; font-weight:600; color:var(--text-secondary); gap:3px; min-height:48px; justify-content:center;}
.tab-icon{font-size:22px;}
.tab-item.active{color:var(--green);}

/* ===== Overlays ===== */
.overlay{position:absolute; inset:0; background:rgba(0,0,0,.4); display:none; align-items:center; justify-content:center; z-index:50; padding:var(--sp-4);}
.overlay.show{display:flex;}
.sheet{background:var(--card-bg); border-radius:var(--radius-lg); width:100%; max-height:90%; overflow-y:auto; padding:var(--sp-5); box-shadow:var(--shadow-float);}
.sheet-title{font-size:var(--fs-title); font-weight:700; display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--sp-4);}
.sheet-close{border:none; background:none; font-size:22px; cursor:pointer; color:var(--text-secondary);}
.field-label{font-size:var(--fs-caption); font-weight:700; color:var(--text-secondary); margin:var(--sp-4) 0 var(--sp-2);}
.input{width:100%; border:1.5px solid var(--border); border-radius:var(--radius-md); padding:12px var(--sp-4); font-size:var(--fs-body); min-height:44px; background:var(--card-bg);}
.input:focus{outline:none; border-color:var(--green);}
.icon-grid{display:grid; grid-template-columns:repeat(6,1fr); gap:8px;}
.icon-opt{aspect-ratio:1; border-radius:var(--radius-sm); border:1.5px solid var(--border); background:var(--card-bg); font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
.icon-opt.sel{border-color:var(--green); background:var(--green-light);}
.period-row{display:flex; gap:8px; flex-wrap:wrap;}
.period-opt{flex:1; min-width:64px; text-align:center; padding:11px 0; border:1.5px solid var(--border); border-radius:var(--radius-md); font-size:var(--fs-caption); font-weight:600; cursor:pointer; min-height:44px;}
.period-opt.sel{border-color:var(--green); background:var(--green-light); color:var(--green);}
.week-row{display:flex; gap:6px; flex-wrap:wrap; margin-top:var(--sp-3);}
.week-opt{padding:10px 12px; border:1.5px solid var(--border); border-radius:var(--radius-pill); font-size:var(--fs-caption); cursor:pointer; min-height:44px;}
.week-opt.sel{background:var(--green); color:#fff; border-color:var(--green);}
.btn-save{width:100%; background:var(--green); color:#fff; border:none; border-radius:var(--radius-pill); font-size:var(--fs-card-title); font-weight:700; padding:14px; margin-top:var(--sp-5); box-shadow:var(--shadow-float); cursor:pointer; min-height:48px;}
/* calendar sheet */
.cal-nav{display:flex; align-items:center; justify-content:space-between; font-weight:700; margin-bottom:var(--sp-3);}
.cal-nav span{cursor:pointer; padding:8px 12px; min-height:44px; display:flex; align-items:center;}
.cal-big{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.cal-big .cal-cell{border-radius:10px; cursor:pointer;}
.cal-big .cal-cell.future{opacity:.35; cursor:default;}
.cal-big .cal-cell.past:hover{background:#F3ECE2;}
/* confirm */
.confirm-text{font-size:var(--fs-body); line-height:1.6; margin-bottom:var(--sp-5);}
.confirm-actions{display:flex; gap:var(--sp-3);}
.btn-cancel{flex:1; background:#F2EDE6; color:var(--text); border:none; border-radius:var(--radius-pill); padding:14px; font-weight:700; font-size:var(--fs-card-title); cursor:pointer; min-height:48px;}
.btn-danger{flex:1; background:var(--danger); color:#fff; border:none; border-radius:var(--radius-pill); padding:14px; font-weight:700; font-size:var(--fs-card-title); cursor:pointer; min-height:48px;}
/* celebration */
.celebration{position:absolute; inset:0; background:rgba(255,248,240,.92); z-index:60; display:none; flex-direction:column; align-items:center; justify-content:center; gap:var(--sp-3);}
.celebration.show{display:flex; animation:fadeIn .3s ease;}
.celeb-text{font-size:32px; font-weight:800; color:var(--green); animation:celebBounce 1.5s ease-in-out infinite alternate;}
@keyframes celebBounce{from{transform:scale(1) rotate(-2deg);}to{transform:scale(1.08) rotate(2deg);}}
.celeb-sub{font-size:var(--fs-card-title); color:var(--text-secondary);}
.celeb-squirrel{font-size:72px;}
/* toast */
.toast{position:absolute; bottom:90px; left:50%; transform:translateX(-50%); background:rgba(51,51,51,.9); color:#fff; padding:10px 18px; border-radius:var(--radius-pill); font-size:var(--fs-caption); z-index:40; opacity:0; transition:opacity .25s; pointer-events:none; white-space:nowrap;}
.toast.show{opacity:1;}

/* demo control (仅演示用, 真实产品无) */
.demo-bar{display:flex; gap:8px; justify-content:center; padding:var(--sp-2) 0; flex-shrink:0; background:var(--bg); border-top:1px dashed var(--border);}
.demo-bar button{font-size:11px; border:1px solid var(--border); background:var(--card-bg); border-radius:var(--radius-pill); padding:6px 12px; cursor:pointer; color:var(--text-secondary); min-height:36px;}
</style>
</head>
<body>
<div class="phone-frame" id="app">
  <!-- Status Bar (安全区，无品牌名/无假数据) -->
  <div class="status-bar"></div>

  <!-- Splash 开屏页 -->
  <div class="splash" id="splash" onclick="hideSplash()">
    <div class="splash-logo">🌱</div>
    <div class="splash-name">成长小树苗</div>
    <div class="splash-slogan">陪你慢慢长大</div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Content -->
  <div class="page-content" id="pageContent">
    <!-- 页面1 今日打卡 -->
    <div class="page active" id="pageHome"></div>
    <!-- 页面2 统计 -->
    <div class="page" id="pageStats"></div>
    <!-- 页面3 任务 -->
    <div class="page" id="pageTasks"></div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab-item active" data-tab="home" onclick="switchTab('home')"><span class="tab-icon">🏠</span>打卡</div>
    <div class="tab-item" data-tab="stats" onclick="switchTab('stats')"><span class="tab-icon">📊</span>统计</div>
    <div class="tab-item" data-tab="tasks" onclick="switchTab('tasks')"><span class="tab-icon">⚙️</span>任务</div>
  </div>

  <!-- 演示控制栏：仅用于高保真稿评审时切换状态，真实产品中不存在 -->
  <div class="demo-bar">
    <button onclick="demoEmpty('home')">演示空状态</button>
    <button onclick="demoBackfill()">演示补卡</button>
    <button onclick="resetHome()">恢复正常</button>
  </div>

  <!-- Calendar Overlay -->
  <div class="overlay" id="calOverlay"><div class="sheet">
    <div class="cal-nav"><span onclick="shiftMonth(-1)">◀</span><span id="calTitle">2025年3月</span><span onclick="shiftMonth(1)">▶</span></div>
    <div class="cal-big" id="calBig"></div>
  </div></div>

  <!-- Add Task Overlay -->
  <div class="overlay" id="taskOverlay"><div class="sheet">
    <div class="sheet-title">添加任务 <button class="sheet-close" onclick="closeOverlay('taskOverlay')">✕</button></div>
    <div class="field-label">任务名称</div>
    <input class="input" id="fName" placeholder="例如：每日阅读30分钟">
    <div class="field-label">为什么要做这个任务？（选填）</div>
    <input class="input" id="fWhy" placeholder="例如：认识更多字">
    <div class="field-label">选择图标</div>
    <div class="icon-grid" id="iconGrid"></div>
    <div class="field-label">重复周期</div>
    <div class="period-row" id="periodRow">
      <div class="period-opt sel" data-p="每天">每天</div>
      <div class="period-opt" data-p="工作日">工作日</div>
      <div class="period-opt" data-p="周末">周末</div>
      <div class="period-opt" data-p="自定义">自定义</div>
    </div>
    <div class="week-row" id="weekRow" style="display:none;">
      <div class="week-opt">周一</div><div class="week-opt">周二</div><div class="week-opt">周三</div>
      <div class="week-opt">周四</div><div class="week-opt">周五</div><div class="week-opt">周六</div><div class="week-opt">周日</div>
    </div>
    <button class="btn-save" onclick="saveTask()">保 存</button>
  </div></div>

  <!-- Confirm Overlay -->
  <div class="overlay" id="confirmOverlay"><div class="sheet">
    <div class="confirm-text" id="confirmText"></div>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="closeOverlay('confirmOverlay')">取消</button>
      <button class="btn-danger" id="confirmOk">确定</button>
    </div>
  </div></div>

  <!-- Celebration -->
  <div class="celebration" id="celebration" onclick="closeCelebration()">
    <div class="celeb-text">🌟 太棒了！🌟</div>
    <div class="celeb-sub">今天的任务全部完成！</div>
    <div class="celeb-squirrel">🐿️</div>
  </div>
</div>

<script>
/* ===== Mock Data ===== */
const ICONS=['📖','✏️','🏃','🎒','🪥','😴','🎹','🧮','🌿','🐶','🧹','🥛'];
let homeTasks=[
  {id:1,icon:'📖',name:'每日阅读30分钟',done:true},
  {id:2,icon:'✏️',name:'练字15分钟',done:false},
  {id:3,icon:'🏃',name:'跳绳100个',done:false},
  {id:4,icon:'🎒',name:'整理书包',done:true},
];
let mgmtTasks=[
  {id:1,icon:'📖',name:'每日阅读30分钟',why:'认识更多字',repeat:'每天'},
  {id:2,icon:'✏️',name:'练字15分钟',why:'',repeat:'工作日'},
  {id:3,icon:'🏃',name:'跳绳100个',why:'长高、身体更健康',repeat:'周一、三、五'},
];
const BADGES=[
  {icon:'🌱',name:'新芽初绽',earned:true,prog:'累计7颗星'},
  {icon:'🌿',name:'小有所成',earned:true,prog:'累计30颗星'},
  {icon:'🪴',name:'枝繁叶茂',earned:false,prog:'还差70颗星'},
  {icon:'🍎',name:'硕果累累',earned:false,prog:'还差341颗星'},
  {icon:'🔥',name:'连续打卡',earned:true,prog:'连续7天'},
  {icon:'🌕',name:'满月打卡',earned:false,prog:'还需连续23天'},
  {icon:'🏅',name:'百颗星',earned:false,prog:'还差77颗星'},
  {icon:'🔒',name:'敬请期待',earned:false,prog:'',reserved:true},
];
const STREAK=7, WEEK_RATE=85;
let homeEmpty=false;
const TODAY=new Date(); TODAY.setHours(0,0,0,0);
let calMonth=TODAY.getMonth(), calYear=TODAY.getFullYear();
let viewDate=isoOf(TODAY);

/* ===== Mock 历史打卡数据（仅历史日，1-10；今日 11 由 homeTasks 实时提供）=====
 * SSOT：历史日 → checkinsByDate；今日 → homeTasks（确保两页一致 + 星星数随操作联动）
 */
const checkinsByDate={};
const _mkDate=(y,m,d)=>{const dt=new Date(y,m,d);dt.setHours(0,0,0,0);return isoOf(dt);};
(function seed(){
  const y=TODAY.getFullYear(), m=TODAY.getMonth();
  checkinsByDate[_mkDate(y,m,1)]={done:4,total:4};
  checkinsByDate[_mkDate(y,m,2)]={done:3,total:4};
  checkinsByDate[_mkDate(y,m,3)]={done:4,total:4};
  checkinsByDate[_mkDate(y,m,4)]={done:4,total:4};
  checkinsByDate[_mkDate(y,m,5)]={done:2,total:4};
  checkinsByDate[_mkDate(y,m,6)]={done:4,total:4};
  checkinsByDate[_mkDate(y,m,7)]={done:3,total:4};
  checkinsByDate[_mkDate(y,m,8)]={done:4,total:4};
  checkinsByDate[_mkDate(y,m,9)]={done:2,total:4};
  checkinsByDate[_mkDate(y,m,10)]={done:3,total:4};
})();
function getCheckin(iso){
  // 今日以 homeTasks 为真源
  if(iso===isoOf(TODAY)){
    return {done:homeTasks.filter(t=>t.done).length, total:homeTasks.length};
  }
  return checkinsByDate[iso] || {done:0,total:homeTasks.length};
}
function cellClassFor(iso){
  const c=getCheckin(iso);
  if(c.done===0) return 'c-none';
  if(c.done>=c.total) return 'c-done';
  return 'c-part';
}
/* 累计星星 = 7 基础 + 全部历史日已打卡数（含今日） */
function calcStars(){
  const base=7;
  let s=0;
  Object.values(checkinsByDate).forEach(c=>{ s+=c.done; });
  s += homeTasks.filter(t=>t.done).length;   // 今日
  return base + s;
}

/* ===== Utils ===== */
function isoOf(d){return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;}
function dateOfIso(s){const [y,m,dd]=s.split('-').map(Number);return new Date(y,m-1,dd);}
function fmtDate(d){const w=['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];return `${d.getMonth()+1}月${d.getDate()}日 ${w}`;}
function showToast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1800);}

/* ===== Render Home ===== */
function renderHome(){
  const c=document.getElementById('pageHome');
  const vd=dateOfIso(viewDate);
  const isPast=vd<TODAY, isFuture=vd>TODAY, isToday=vd.getTime()===TODAY.getTime();
  if(isToday) homeTasks.forEach(t=>{ t.backfill=false; });     // L1.4 今日永不显示补卡
  const doneCount=homeTasks.filter(t=>t.done).length;
  const fireLit=isPast || homeTasks.some(t=>t.done);
  let h='';
  h+=`<div class="home-header">
    <div class="streak-fire"><span class="fire-icon ${fireLit?'lit':''}">${fireLit?'🔥':'🪵'}</span><span>${STREAK}</span></div>
    <div class="star-count">⭐ ${calcStars()}</div>
    <div class="date-display" onclick="openCal()"><span>${fmtDate(vd)}</span><span>📅</span></div>
  </div>`;
  h+=`<div class="backfill-banner ${isPast?'show':''}">📅 补卡模式 · ${fmtDate(vd)}</div>`;
  if(homeEmpty){
    h+=`<div class="empty-state"><div class="squirrel">🐿️</div><div class="empty-title">来添加你的第一个任务吧！</div><div class="empty-sub">果果陪你一起打卡哦～</div><button class="btn-primary" onclick="switchTab('tasks')">去添加任务</button></div>`;
  }else if(isFuture){
    h+=`<div class="empty-state"><div class="squirrel">🐿️</div><div class="empty-title">这一天还没到哦</div><div class="empty-sub">${fmtDate(vd)} 是未来，先安排好任务吧～</div></div>`;
  }else if(homeTasks.length===0){
    h+=`<div class="empty-state"><div class="squirrel">🐿️</div><div class="empty-title">今天没有安排任务</div><div class="empty-sub">好好休息吧～</div></div>`;
  }else{
    h+=`<div class="task-list">`;
    homeTasks.forEach(t=>{
      h+=`<div class="task-card ${t.done?'completed':''} ${t.backfill?'backfill':''}" onclick="onTaskClick(${t.id})">
        ${t.backfill?'<div class="backfill-tag">补</div>':''}
        <span class="task-icon">${t.icon}</span>
        <span class="task-name">${t.name}</span>
        <span class="task-status">${t.done?'✓':''}</span>
      </div>`;
    });
    h+=`</div>`;
    const cnt=homeTasks.filter(t=>t.done).length;
    const pct=Math.round(cnt/homeTasks.length*100);
    h+=`<div class="progress-wrap"><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-text">已完成 ${cnt}/${homeTasks.length}</div></div>`;
  }
  c.innerHTML=h;
}
function onTaskClick(id){
  const vd=dateOfIso(viewDate);
  if(vd>TODAY) return;                          // 未来日期：不可点
  const t=homeTasks.find(x=>x.id===id); if(!t) return;
  if(t.done){
    const isBackfill=vd<TODAY;
    const verb=isBackfill?'补卡':'打卡';
    document.getElementById('confirmText').textContent=`确定撤销「${t.name}」的${verb}吗？`;
    document.getElementById('confirmOk').onclick=()=>{ closeOverlay('confirmOverlay'); t.done=false; t.backfill=false; renderHome(); };
    openOverlay('confirmOverlay');
  }else{
    t.done=true;
    if(vd<TODAY) t.backfill=true;                // 补卡模式：标记为补卡
    renderHome();
    if(homeTasks.length>0 && homeTasks.every(x=>x.done) && vd.getTime()===TODAY.getTime()) setTimeout(showCelebration,300);
  }
}
function showCelebration(){document.getElementById('celebration').classList.add('show');}
function closeCelebration(){document.getElementById('celebration').classList.remove('show');}

/* ===== Render Stats ===== */
function renderStats(){
  const c=document.getElementById('pageStats');
  const y=TODAY.getFullYear(), m=TODAY.getMonth();
  let grid='';for(let i=0;i<7;i++)grid+=`<div class="cal-head">${['日','一','二','三','四','五','六'][i]}</div>`;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  for(let i=0;i<first;i++)grid+=`<div class="cal-cell c-empty"></div>`;
  for(let d=1;d<=days;d++){
    const day=new Date(y,m,d);
    if(day>TODAY){ grid+=`<div class="cal-cell c-empty">${d}</div>`; }
    else {
      const iso=_mkDate(y,m,d);
      const cls=cellClassFor(iso);
      const tip=`${d}日 · ${getCheckin(iso).done}/${getCheckin(iso).total}`;
      grid+=`<div class="cal-cell ${cls}" title="${tip}" onclick="pickDate(${d})">${d}</div>`;
    }
  }
  let badges='';BADGES.forEach(b=>{badges+=`<div class="badge ${b.earned?'earned':b.reserved?'reserved locked':'locked'}">
    <div class="badge-icon">${b.icon}</div><div class="badge-name">${b.name}</div>${b.prog?`<div class="badge-prog">${b.prog}</div>`:''}</div>`;});
  c.innerHTML=`<div class="stats-header">📊 我的成长</div>
    <div class="streak-block"><div class="streak-num">🔥 ${STREAK}</div><div class="streak-label">连续打卡</div><div class="streak-best">最长 12 天</div></div>
    <div class="card"><div class="card-title">本周完成率</div><div class="ring-wrap">
      <div class="ring"><div class="ring-inner">${WEEK_RATE}%</div></div>
      <div class="ring-desc">这一周你完成得<br>很棒，继续保持！</div></div></div>
    <div class="card"><div class="card-title">打卡日历</div><div class="cal-month">${y}年${m+1}月</div><div class="cal-grid">${grid}</div></div>
    <div class="card"><div class="card-title">🏅 徽章墙</div><div class="badge-grid">${badges}</div></div>`;
}

/* ===== Render Tasks ===== */
function renderTasks(){
  const c=document.getElementById('pageTasks');
  let h=`<div class="tasks-header">⚙️ 我的任务</div>`;
  if(mgmtTasks.length===0){
    h+=`<div class="empty-state" style="padding-top:var(--sp-8);"><div class="squirrel">🐿️</div><div class="empty-title">还没有任务哦</div><div class="empty-sub">点击下方按钮，添加你的第一个任务吧！</div></div>`;
  }else{
    h+=`<div class="task-mgmt-list">`;
    mgmtTasks.forEach(t=>{h+=`<div class="tm-card" onclick="editTask(${t.id})">
      <span class="tm-icon">${t.icon}</span>
      <div class="tm-info"><div class="tm-name">${t.name}</div>
      ${t.why?`<div class="tm-purpose">💭 ${t.why}</div>`:''}<div class="tm-repeat">${t.repeat}</div></div>
      <div class="tm-actions"><button class="tm-btn edit" onclick="event.stopPropagation();editTask(${t.id})">✏️</button>
      <button class="tm-btn del" onclick="event.stopPropagation();delTask(${t.id})">🗑</button></div>
    </div>`;});
    h+=`</div>`;
  }
  h+=`<button class="add-btn" onclick="openTask()">＋ 添加任务</button>`;
  c.innerHTML=h;
}
function editTask(id){const t=mgmtTasks.find(x=>x.id===id);if(t)showToast(`编辑：${t.name}`);}
function delTask(id){const t=mgmtTasks.find(x=>x.id===id);
  document.getElementById('confirmText').textContent=`确定删除「${t.name}」吗？之前的打卡记录会留着哦～`;
  document.getElementById('confirmOk').onclick=()=>{mgmtTasks=mgmtTasks.filter(x=>x.id!==id);closeOverlay('confirmOverlay');renderTasks();showToast('已删除');};
  openOverlay('confirmOverlay');
}

/* ===== Task form ===== */
let selIcon=ICONS[0];
function openTask(){
  selIcon=ICONS[0];
  document.getElementById('fName').value='';document.getElementById('fWhy').value='';
  const ig=document.getElementById('iconGrid');ig.innerHTML='';
  ICONS.forEach((ic,i)=>{const b=document.createElement('div');b.className='icon-opt'+(i===0?' sel':'');b.textContent=ic;b.onclick=()=>{selIcon=ic;[...ig.children].forEach(x=>x.classList.remove('sel'));b.classList.add('sel');};ig.appendChild(b);});
  document.querySelectorAll('#periodRow .period-opt').forEach(p=>p.classList.remove('sel'));
  document.querySelector('#periodRow .period-opt').classList.add('sel');
  document.getElementById('weekRow').style.display='none';
  openOverlay('taskOverlay');
}
document.getElementById('periodRow').addEventListener('click',e=>{const p=e.target.closest('.period-opt');if(!p)return;
  document.querySelectorAll('#periodRow .period-opt').forEach(x=>x.classList.remove('sel'));p.classList.add('sel');
  document.getElementById('weekRow').style.display=p.dataset.p==='自定义'?'flex':'none';});
document.getElementById('weekRow').addEventListener('click',e=>{const w=e.target.closest('.week-opt');if(!w)return;w.classList.toggle('sel');});
function saveTask(){
  const name=document.getElementById('fName').value.trim();if(!name){showToast('请填写任务名称');return;}
  const why=document.getElementById('fWhy').value.trim();
  const per=document.querySelector('#periodRow .period-opt.sel').dataset.p;
  let repeat=per;
  if(per==='自定义'){const sel=[...document.querySelectorAll('#weekRow .week-opt.sel')].map(x=>x.textContent);repeat=sel.join('、')||'自定义';}
  mgmtTasks.push({id:Date.now(),icon:selIcon,name,why,repeat});
  closeOverlay('taskOverlay');renderTasks();showToast('任务已添加 🌱');
}

/* ===== Calendar ===== */
function openCal(){renderCal();openOverlay('calOverlay');}
function renderCal(){
  document.getElementById('calTitle').textContent=`${calYear}年${calMonth+1}月`;
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  let g='';for(let i=0;i<7;i++)g+=`<div class="cal-cell" style="font-weight:700;color:var(--text-secondary);font-size:10px;">${['日','一','二','三','四','五','六'][i]}</div>`;
  for(let i=0;i<first;i++)g+=`<div class="cal-cell"></div>`;
  const today=new Date();
  for(let d=1;d<=days;d++){
    const isFuture=new Date(calYear,calMonth,d)>today;
    const isToday=calYear===today.getFullYear()&&calMonth===today.getMonth()&&d===today.getDate();
    g+=`<div class="cal-cell ${isFuture?'future':'past'} ${isToday?'c-today':''}" ${isFuture?'':`onclick="pickDate(${d})"`}>${d}</div>`;
  }
  document.getElementById('calBig').innerHTML=g;
}
function shiftMonth(n){calMonth+=n;if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}renderCal();}
function pickDate(d){ viewDate=isoOf(new Date(calYear,calMonth,d)); closeOverlay('calOverlay'); switchTab('home'); showToast(viewDate===isoOf(TODAY)?'已回到今天的打卡页':`已跳转到 ${fmtDate(dateOfIso(viewDate))}`); }

/* ===== Tab / Overlay ===== */
function switchTab(tab){
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  if(tab==='home')renderHome(); if(tab==='stats')renderStats(); if(tab==='tasks')renderTasks();
}
function openOverlay(id){document.getElementById(id).classList.add('show');}
function closeOverlay(id){document.getElementById(id).classList.remove('show');}

/* ===== Demo controls ===== */
function demoEmpty(){homeEmpty=true;renderHome();showToast('演示：空状态');}
function demoBackfill(){const p=new Date(TODAY);p.setDate(p.getDate()-2);viewDate=isoOf(p);homeEmpty=false;homeTasks.forEach((t,i)=>{t.done=(i<2);t.backfill=(i===0);});renderHome();showToast('演示：补卡模式（前 2 项已补卡 + 补卡标签）');}
function resetHome(){homeEmpty=false;viewDate=isoOf(TODAY);homeTasks.forEach(t=>{t.done=(t.id===1||t.id===4);t.backfill=false;});renderHome();}

/* ===== Splash ===== */
function hideSplash(){document.getElementById('splash').classList.add('hide');}
setTimeout(hideSplash,1500);

/* ===== Init ===== */
renderHome();
</script>
</body>
</html>
