<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>成长小树苗</title>
<style>
/* ===== Design Tokens (映射 design-spec §2) ===== */
:root{
  --green:#5CB85C; --green-light:#E8F5E9; --yellow:#F0AD4E; --blue:#5BC0DE;
  --bg:#FFF8F0; --card-bg:#FFFFFF; --text:#333333; --text-secondary:#888888;
  --border:#E8E0D8; --orange-tag:#FFF3E0; --danger:#E57373; --gold:#F4B400;
  --radius-sm:12px; --radius-md:16px; --radius-lg:24px; --radius-pill:999px;
  --shadow-card:0 1px 3px rgba(0,0,0,.05); --shadow-float:0 8px 24px rgba(0,0,0,.12);
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px; --sp-8:32px;
  --fs-display:56px; --fs-title:20px; --fs-card-title:15px; --fs-body:15px;
  --fs-caption:13px; --fs-aux:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,sans-serif;
  background:#EDE7DF; display:flex; justify-content:center; align-items:center;
  min-height:100vh; -webkit-tap-highlight-color:transparent; user-select:none; color:var(--text);
}
/* ===== Phone Frame ===== */
.phone-frame{
  width:375px; height:812px; background:var(--bg); border-radius:40px; overflow:hidden;
  position:relative; box-shadow:0 24px 70px rgba(0,0,0,.18),0 0 0 2px #2b2b2b;
  display:flex; flex-direction:column;
}
@media(max-width:480px){
  body{align-items:stretch; padding:0;}
  .phone-frame{width:100%; height:100vh; height:100dvh; border-radius:0; box-shadow:none;}
}
/* ===== Status Bar (顶部安全区，无品牌名/无假数据) ===== */
.status-bar{
  height:44px; flex-shrink:0; background:var(--bg);
}
/* ===== System Navbar (全局小程序名) ===== */
.navbar{
  height:44px; flex-shrink:0; background:var(--bg); display:flex; align-items:center; justify-content:center;
  font-size:17px; font-weight:700; color:var(--text); position:relative; z-index:10;
}
/* ===== Page Header (三页共用标题区) ===== */
.page-header{display:flex; align-items:center; gap:12px; padding:var(--sp-3) 0 var(--sp-2);}
.page-header-icon{width:40px; height:40px; border-radius:var(--radius-md); background:var(--green-light); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0;}
.page-header-text{display:flex; flex-direction:column;}
.page-header-title{font-size:22px; font-weight:700; color:var(--text); line-height:1.2;}
.page-header-subtitle{font-size:13px; color:var(--text-secondary); margin-top:2px; line-height:1.2;}
/* ===== Splash 开屏页 ===== */
.splash{
  position:absolute; inset:0; z-index:70; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:var(--sp-3);
  transition:opacity .6s ease;
}
.splash.hide{opacity:0; pointer-events:none;}
.splash-logo{font-size:72px; animation:splashPop .6s ease;}
@keyframes splashPop{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
.splash-name{font-size:28px; font-weight:800; color:var(--green);}
.splash-slogan{font-size:var(--fs-caption); color:var(--text-secondary);}
/* ===== Content ===== */
.page-content{flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; scroll-behavior:smooth;}
.page-content::-webkit-scrollbar{display:none;}
.page{display:none; padding:0 var(--sp-4) var(--sp-5); animation:fadeIn .25s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ===== Home Header (sticky) ===== */
.home-header{
  position:sticky; top:0; z-index:10; background:var(--bg); margin:0 calc(-1*var(--sp-4));
  padding:var(--sp-2) var(--sp-4) var(--sp-3); display:flex; align-items:center; gap:var(--sp-3); justify-content:space-between;
}
.home-header>*{flex:1;}
.streak-fire{display:flex; align-items:center; gap:2px; font-weight:800; font-size:18px; color:var(--yellow);}
.fire-icon{font-size:22px;}
.fire-icon.lit{filter:drop-shadow(0 0 6px rgba(240,173,78,.7)); animation:flame 1.4s ease-in-out infinite alternate;}
@keyframes flame{from{transform:scale(1);}to{transform:scale(1.12) rotate(-3deg);}}
.star-count{text-align:center; font-weight:700; font-size:var(--fs-card-title); color:var(--gold);}
.date-display{display:flex; align-items:center; justify-content:flex-end; gap:4px; font-size:var(--fs-aux); font-weight:600; color:var(--text-secondary); background:var(--card-bg); border:1px solid var(--border); padding:6px 10px; border-radius:var(--radius-pill); min-height:44px;}
/* ===== Backfill banner ===== */
.backfill-banner{
  display:none; align-items:center; gap:6px; background:var(--orange-tag); color:var(--yellow);
  font-size:var(--fs-caption); font-weight:700; padding:10px var(--sp-4); border-radius:var(--radius-md);
  margin-bottom:var(--sp-3);
}
.backfill-banner.show{display:flex;}

/* ===== Task Card ===== */
.task-list{display:flex; flex-direction:column; gap:var(--sp-3);}
.task-card{
  display:flex; align-items:center; gap:var(--sp-3); background:var(--card-bg);
  border:1px solid var(--border); border-radius:var(--radius-md); padding:var(--sp-4);
  box-shadow:var(--shadow-card); cursor:pointer; min-height:64px; position:relative;
  transition:background .3s ease-out;
}
.task-card.completed{background:var(--green-light); border-color:transparent;}
.task-card.backfill{background:var(--orange-tag);}
.task-icon{font-size:26px; width:30px; text-align:center; flex-shrink:0;}
.task-name{font-size:var(--fs-card-title); font-weight:600; flex:1;}
.task-status{
  width:28px; height:28px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  border:2px solid var(--border); color:transparent; font-size:15px; font-weight:700;
}
.task-card.completed .task-status{background:var(--green); border-color:var(--green); color:#fff;}
.backfill-tag{
  position:absolute; top:-8px; right:14px; background:var(--yellow); color:#fff; font-size:11px;
  font-weight:700; padding:2px 8px; border-radius:var(--radius-pill); box-shadow:var(--shadow-card);
}
/* ===== Progress ===== */
.progress-wrap{margin-top:var(--sp-5);}
.progress-track{height:12px; background:#EFE7DC; border-radius:var(--radius-pill); overflow:hidden;}
.progress-fill{height:100%; background:linear-gradient(90deg,var(--green),#7CC47F); border-radius:var(--radius-pill); transition:width .4s ease;}
.progress-text{text-align:center; font-size:var(--fs-card-title); font-weight:700; margin-top:var(--sp-2);}

/* ===== Empty State ===== */
.empty-state{display:flex; flex-direction:column; align-items:center; text-align:center; padding:var(--sp-8) var(--sp-4); gap:var(--sp-3);}
.empty-state .squirrel{font-size:72px;}
.empty-title{font-size:var(--fs-title); font-weight:700;}
.empty-sub{font-size:var(--fs-caption); color:var(--text-secondary);}

/* ===== Buttons ===== */
.btn-primary{
  background:var(--green); color:#fff; border:none; border-radius:var(--radius-pill);
  font-size:var(--fs-card-title); font-weight:700; padding:14px 28px; box-shadow:var(--shadow-float);
  cursor:pointer; min-height:44px;
}
.btn-block{display:block; width:100%; margin-top:var(--sp-4);}

/* ===== Stats Page ===== */
.streak-block{text-align:center; padding:var(--sp-5) 0 var(--sp-4);}
.streak-num{font-size:var(--fs-display); font-weight:800; color:var(--yellow); line-height:1; filter:drop-shadow(0 2px 6px rgba(240,173,78,.3));}
.streak-num .streak-unit{font-size:24px; font-weight:700; margin-left:4px; color:var(--text-secondary); filter:none;}
.streak-label{font-size:var(--fs-card-title); font-weight:600; margin-top:6px;}
.streak-best{font-size:var(--fs-caption); color:var(--text-secondary); margin-top:4px;}
.card{background:var(--card-bg); border-radius:var(--radius-md); padding:var(--sp-4); box-shadow:var(--shadow-card); margin-top:var(--sp-4);}
.user-card{display:flex; align-items:center; gap:12px; background:var(--card-bg); border-radius:var(--radius-md); padding:var(--sp-4); box-shadow:var(--shadow-card); margin-top:var(--sp-3); cursor:pointer;}
.user-avatar{width:52px; height:52px; border-radius:50%; background:var(--green-light); display:flex; align-items:center; justify-content:center; font-size:28px; flex-shrink:0;}
.user-meta{flex:1; min-width:0;}
.user-name{font-size:17px; font-weight:700; color:var(--text);}
.user-hint{font-size:12px; color:var(--text-secondary); margin-top:2px;}
.user-chevron{color:#C9C9C9; font-size:18px;}
.card-title{font-size:var(--fs-card-title); font-weight:700; margin-bottom:var(--sp-3);}
/* ring */
.ring-wrap{display:flex; align-items:center; gap:var(--sp-4);}
.ring{width:96px; height:96px; border-radius:50%; background:conic-gradient(var(--green) 0% 85%, #EFE7DC 85% 100%); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.ring-inner{width:74px; height:74px; border-radius:50%; background:var(--card-bg); display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:800; color:var(--green);}
.ring-desc{font-size:var(--fs-caption); color:var(--text-secondary);}
/* calendar heatmap */
.cal-month{font-size:var(--fs-aux); font-weight:700; color:var(--text-secondary); margin-bottom:8px;}
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.cal-cell{position:relative; aspect-ratio:1; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--text-secondary);}
.cal-head{font-size:10px; color:var(--text-secondary); font-weight:700; aspect-ratio:1; display:flex; align-items:center; justify-content:center;}
.c-done{background:#7CC47F; cursor:pointer; color:#fff; font-weight:700;}
.c-part{background:var(--yellow); cursor:pointer; color:#fff; font-weight:700;}
.c-none{background:#E0E0E0; cursor:pointer; color:var(--text-secondary); font-weight:600;}
.c-empty{background:transparent; color:var(--text-secondary);}
.bf-mark{position:absolute; top:2px; right:2px; font-size:8px; background:rgba(255,255,255,.9); color:var(--yellow); font-weight:800; padding:1px 3px; border-radius:4px; line-height:1;}
.c-today{outline:2px solid var(--green); outline-offset:-2px;}
/* badges */
.badge-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:var(--sp-3);}
.badge{display:flex; flex-direction:column; align-items:center; gap:4px; text-align:center; padding:var(--sp-2) 0; border-radius:var(--radius-sm);}
.badge-icon{font-size:30px; filter:grayscale(1); opacity:.5;}
.badge.earned .badge-icon{filter:none; opacity:1; text-shadow:0 0 8px rgba(244,180,0,.5);}
.badge-name{font-size:11px; font-weight:600; color:var(--text-secondary);}
.badge.earned .badge-name{color:var(--text);}
.badge-prog{font-size:10px; color:var(--text-secondary);}
.badge.locked .badge-icon{position:relative;}
.badge-reserved{opacity:.4;}

/* ===== Tasks Page ===== */
.task-mgmt-list{display:flex; flex-direction:column; gap:var(--sp-3); margin-top:var(--sp-4);}
.tm-card{background:var(--card-bg); border-radius:var(--radius-md); padding:var(--sp-4); box-shadow:var(--shadow-card); display:flex; align-items:center; gap:var(--sp-3); min-height:64px;}
.tm-icon{font-size:26px; width:30px; text-align:center; flex-shrink:0;}
.tm-info{flex:1; min-width:0;}
.tm-name{font-size:var(--fs-card-title); font-weight:600;}
.tm-purpose{font-size:var(--fs-caption); color:var(--blue); font-style:italic; margin-top:3px;}
.tm-repeat{font-size:var(--fs-caption); color:var(--text-secondary); margin-top:2px;}
.tm-actions{display:flex; gap:8px; flex-shrink:0;}
.tm-btn{width:36px; height:36px; border-radius:50%; border:none; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; min-height:44px; min-width:44px;}
.tm-btn.edit{background:var(--green-light); color:var(--green);}
.tm-btn.del{background:#FFEBEE; color:var(--danger);}
.add-btn{
  position:sticky; bottom:var(--sp-4); margin-top:var(--sp-5); width:100%; background:var(--green);
  color:#fff; border:none; border-radius:var(--radius-pill); font-size:var(--fs-card-title); font-weight:700;
  padding:15px; box-shadow:var(--shadow-float); cursor:pointer; min-height:48px;
}
.add-btn:disabled{background:#C9C9C9; cursor:not-allowed; box-shadow:none;}

/* ===== Tab Bar ===== */
.tab-bar{display:flex; border-top:1px solid var(--border); background:var(--card-bg); flex-shrink:0; padding-bottom:env(safe-area-inset-bottom,8px);}
.tab-item{flex:1; display:flex; flex-direction:column; align-items:center; padding:8px 0 4px; cursor:pointer; font-size:11px; font-weight:600; color:var(--text-secondary); gap:3px; min-height:48px; justify-content:center;}
.tab-icon{font-size:22px;}
.tab-item.active{color:var(--green);}

/* ===== Overlays ===== */
.overlay{position:absolute; inset:0; background:rgba(0,0,0,.4); display:none; align-items:center; justify-content:center; z-index:50; padding:var(--sp-4);}
.overlay.show{display:flex;}
.sheet{background:var(--card-bg); border-radius:var(--radius-lg); width:100%; max-height:90%; overflow-y:auto; padding:var(--sp-5); box-shadow:var(--shadow-float);}
.sheet-title{font-size:var(--fs-title); font-weight:700; display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--sp-4);}
.sheet-close{border:none; background:none; font-size:22px; cursor:pointer; color:var(--text-secondary);}
.field-label{font-size:var(--fs-caption); font-weight:700; color:var(--text-secondary); margin:var(--sp-4) 0 var(--sp-2);}
.input{width:100%; border:1.5px solid var(--border); border-radius:var(--radius-md); padding:12px var(--sp-4); font-size:var(--fs-body); min-height:44px; background:var(--card-bg);}
.input:focus{outline:none; border-color:var(--green);}
.icon-grid{display:grid; grid-template-columns:repeat(6,1fr); gap:8px;}
.icon-opt{aspect-ratio:1; border-radius:var(--radius-sm); border:1.5px solid var(--border); background:var(--card-bg); font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
.icon-opt.sel{border-color:var(--green); background:var(--green-light);}
.period-row{display:flex; gap:8px; flex-wrap:wrap;}
.period-opt{flex:1; min-width:64px; text-align:center; padding:11px 0; border:1.5px solid var(--border); border-radius:var(--radius-md); font-size:var(--fs-caption); font-weight:600; cursor:pointer; min-height:44px;}
.period-opt.sel{border-color:var(--green); background:var(--green-light); color:var(--green);}
.week-row{display:flex; gap:6px; flex-wrap:wrap; margin-top:var(--sp-3);}
.week-opt{padding:10px 12px; border:1.5px solid var(--border); border-radius:var(--radius-pill); font-size:var(--fs-caption); cursor:pointer; min-height:44px;}
.week-opt.sel{background:var(--green); color:#fff; border-color:var(--green);}
.btn-save{width:100%; background:var(--green); color:#fff; border:none; border-radius:var(--radius-pill); font-size:var(--fs-card-title); font-weight:700; padding:14px; margin-top:var(--sp-5); box-shadow:var(--shadow-float); cursor:pointer; min-height:48px;}
/* calendar sheet */
.cal-nav{display:flex; align-items:center; justify-content:space-between; font-weight:700; margin-bottom:var(--sp-3);}
.cal-nav span{cursor:pointer; padding:8px 12px; min-height:44px; display:flex; align-items:center;}
.cal-big{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.cal-big .cal-cell{border-radius:10px; cursor:pointer;}
.cal-big .cal-cell.future{opacity:.35; cursor:default;}
.cal-big .cal-cell.past:hover{background:#F3ECE2;}
/* confirm */
.confirm-text{font-size:var(--fs-body); line-height:1.6; margin-bottom:var(--sp-5);}
.confirm-actions{display:flex; gap:var(--sp-3);}
.btn-cancel{flex:1; background:#F2EDE6; color:var(--text); border:none; border-radius:var(--radius-pill); padding:14px; font-weight:700; font-size:var(--fs-card-title); cursor:pointer; min-height:48px;}
.btn-danger{flex:1; background:var(--danger); color:#fff; border:none; border-radius:var(--radius-pill); padding:14px; font-weight:700; font-size:var(--fs-card-title); cursor:pointer; min-height:48px;}
/* celebration */
.celebration{position:absolute; inset:0; background:rgba(255,248,240,.92); z-index:60; display:none; flex-direction:column; align-items:center; justify-content:center; gap:var(--sp-3);}
.celebration.show{display:flex; animation:fadeIn .3s ease;}
.celeb-text{font-size:32px; font-weight:800; color:var(--green); animation:celebBounce 1.5s ease-in-out infinite alternate;}
@keyframes celebBounce{from{transform:scale(1) rotate(-2deg);}to{transform:scale(1.08) rotate(2deg);}}
.celeb-sub{font-size:var(--fs-card-title); color:var(--text-secondary);}
.celeb-squirrel{font-size:72px;}
/* toast */
.toast{position:absolute; bottom:90px; left:50%; transform:translateX(-50%); background:rgba(51,51,51,.9); color:#fff; padding:10px 18px; border-radius:var(--radius-pill); font-size:var(--fs-caption); z-index:40; opacity:0; transition:opacity .25s; pointer-events:none; white-space:nowrap;}
.toast.show{opacity:1;}

/* ===== Star burst animation ===== */
.star-burst{position:absolute; pointer-events:none; z-index:50;}
.star-particle{position:absolute; font-size:18px; animation:starFly .6s ease-out forwards;}
@keyframes starFly{
  0%{transform:translate(0,0) scale(1);opacity:1;}
  100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;}
}

/* ===== Badge animation overlay ===== */
.badge-animation{
  position:absolute; inset:0; z-index:65; background:rgba(255,248,240,.95);
  display:none; flex-direction:column; align-items:center; justify-content:center; gap:var(--sp-3);
}
.badge-animation.show{display:flex;}
.badge-animation .ba-icon{font-size:80px; animation:badgeReveal 1.5s ease-out;}
@keyframes badgeReveal{
  0%{filter:grayscale(1);opacity:.3;transform:scale(.5);}
  50%{filter:grayscale(.5);opacity:.8;transform:scale(1.1);}
  100%{filter:grayscale(0);opacity:1;transform:scale(1);}
}
.badge-animation .ba-text{font-size:24px;font-weight:800;color:var(--green);}
.badge-animation .ba-squirrel{font-size:60px;}
</style>
</head>
<body>
<div class="phone-frame" id="app">
  <div class="status-bar"></div>
  <div class="navbar">成长小树苗</div>

  <!-- Splash -->
  <div class="splash" id="splash" onclick="hideSplash()">
    <div class="splash-logo">🌱</div>
    <div class="splash-name">成长小树苗</div>
    <div class="splash-slogan">陪你慢慢长大</div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Content -->
  <div class="page-content" id="pageContent">
    <div class="page active" id="pageHome"></div>
    <div class="page" id="pageStats"></div>
    <div class="page" id="pageTasks"></div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab-item active" data-tab="home" onclick="switchTab('home')"><span class="tab-icon">🏠</span>打卡</div>
    <div class="tab-item" data-tab="tasks" onclick="switchTab('tasks')"><span class="tab-icon">📋</span>任务</div>
    <div class="tab-item" data-tab="stats" onclick="switchTab('stats')"><span class="tab-icon">👤</span>我的成长</div>
  </div>

  <!-- Calendar Overlay -->
  <div class="overlay" id="calOverlay"><div class="sheet">
    <div class="cal-nav"><span onclick="shiftMonth(-1)">◀</span><span id="calTitle">2025年3月</span><span onclick="shiftMonth(1)">▶</span></div>
    <div class="cal-big" id="calBig"></div>
  </div></div>

  <!-- Task Form Overlay -->
  <div class="overlay" id="taskOverlay"><div class="sheet">
    <div class="sheet-title" id="taskFormTitle">添加任务 <button class="sheet-close" onclick="closeOverlay('taskOverlay')">✕</button></div>
    <div class="field-label">任务名称</div>
    <input class="input" id="fName" placeholder="例如：每日阅读30分钟" maxlength="20">
    <div class="field-label">为什么要做这个任务？（选填）</div>
    <input class="input" id="fWhy" placeholder="例如：认识更多字" maxlength="50">
    <div class="field-label">选择图标</div>
    <div class="icon-grid" id="iconGrid"></div>
    <div class="field-label">重复周期</div>
    <div class="period-row" id="periodRow">
      <div class="period-opt sel" data-p="每天">每天</div>
      <div class="period-opt" data-p="工作日">工作日</div>
      <div class="period-opt" data-p="周末">周末</div>
      <div class="period-opt" data-p="自定义">自定义</div>
    </div>
    <div class="week-row" id="weekRow" style="display:none;">
      <div class="week-opt">周一</div><div class="week-opt">周二</div><div class="week-opt">周三</div>
      <div class="week-opt">周四</div><div class="week-opt">周五</div><div class="week-opt">周六</div><div class="week-opt">周日</div>
    </div>
    <button class="btn-save" onclick="saveTask()">保 存</button>
  </div></div>

  <!-- Confirm Overlay -->
  <div class="overlay" id="confirmOverlay"><div class="sheet">
    <div class="confirm-text" id="confirmText"></div>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="closeOverlay('confirmOverlay')">取消</button>
      <button class="btn-danger" id="confirmOk">确定</button>
    </div>
  </div></div>

  <!-- Celebration -->
  <div class="celebration" id="celebration" onclick="closeCelebration()">
    <div class="celeb-text">🌟 太棒了！🌟</div>
    <div class="celeb-sub">今天的任务全部完成！</div>
    <div class="celeb-squirrel">🐿️</div>
  </div>

  <!-- Badge Animation Overlay -->
  <div class="badge-animation" id="badgeAnimation" onclick="closeBadgeAnimation()">
    <div class="ba-icon" id="baIcon">🌱</div>
    <div class="ba-text" id="baText">获得新徽章！</div>
    <div class="ba-squirrel">🐿️</div>
  </div>
</div>

<script>
/* ========================================================================
   SECTION A: Constants & Initial Data
   ======================================================================== */

const ICONS=['📖','✏️','🏃','🎒','🪥','😴','🎹','🧮','🌿','🐶','🧹','🥛'];

// Tech-spec §3.3: Badge definitions
const BADGE_DEFS=[
  {type:'sprout',      icon:'🌱',name:'新芽初绽',category:'stars', threshold:7},
  {type:'growing',     icon:'🌿',name:'小有所成',category:'stars', threshold:30},
  {type:'thriving',    icon:'🪴',name:'枝繁叶茂',category:'stars', threshold:100},
  {type:'harvest',     icon:'🍎',name:'硕果累累',category:'stars', threshold:365},
  {type:'week_streak', icon:'🔥',name:'连续打卡',category:'streak',threshold:7},
  {type:'month_streak',icon:'🌕',name:'满月打卡',category:'streak',threshold:30},
  {type:'star_hundred',icon:'🏅',name:'百颗星', category:'stars', threshold:100},
];

// Tech-spec §3.1: Default mgmtTasks (used when no saved data)
const DEFAULT_MGMT_TASKS=[
  {id:1,icon:'📖',name:'每日阅读30分钟',purpose:'认识更多字',repeat_type:'daily',repeat_days:[],sort_order:1,is_deleted:false,created_at:'2026-07-01T00:00:00.000Z'},
  {id:2,icon:'✏️',name:'练字15分钟',purpose:'',repeat_type:'daily',repeat_days:[],sort_order:2,is_deleted:false,created_at:'2026-07-01T00:00:00.000Z'},
  {id:3,icon:'🏃',name:'跳绳100个',purpose:'长高、身体更健康',repeat_type:'daily',repeat_days:[],sort_order:3,is_deleted:false,created_at:'2026-07-01T00:00:00.000Z'},
  {id:4,icon:'🎒',name:'整理书包',purpose:'',repeat_type:'daily',repeat_days:[],sort_order:4,is_deleted:false,created_at:'2026-07-01T00:00:00.000Z'},
];

/* ========================================================================
   SECTION B: Global State (mutable)
   ======================================================================== */

let mgmtTasks=[...DEFAULT_MGMT_TASKS.map(t=>({...t}))];

// Tech-spec §3.2: Fine-grained checkins: { dateIso: { taskId: {done,backfill,created_at} } }
let checkinsByDate={};

// Tech-spec §3.3: Badge earned state: { sprout: true, week_streak: true, ... }
let badges={};

// Snapshot mechanism (踩坑 #5/#12): ensures stats page and home page data consistency
const homeTasksByDate={};
function taskSnapshot(){ return homeTasks.map(t=>({...t})); }
function loadSnapshot(iso){ homeTasks=(homeTasksByDate[iso]||homeTasks).map(t=>({...t})); }
function saveSnapshot(iso){ homeTasksByDate[iso]=taskSnapshot(); }

let homeTasks=[];          // Derived from mgmtTasks + checkinsByDate per viewDate
const TODAY=new Date(); TODAY.setHours(0,0,0,0);
let calMonth=TODAY.getMonth(), calYear=TODAY.getFullYear();
let viewDate=isoOf(TODAY);
let editingTaskId=null;    // null=add mode, number=edit mode

/* ========================================================================
   SECTION C: Utils
   ======================================================================== */

function isoOf(d){return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;}
function dateOfIso(s){const[y,m,dd]=s.split('-').map(Number);return new Date(y,m-1,dd);}
function fmtDate(d){const w=['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];return `${d.getMonth()+1}月${d.getDate()}日 ${w}`;}
function showToast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1800);}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function getWeekday(dateStr){const d=dateOfIso(dateStr);const w=d.getDay();return w===0?7:w;} // 1=Mon..7=Sun

// Tech-spec §1.4: Determine if task is active on a given date
function isActiveOnDate(task,dateStr){
  const wd=getWeekday(dateStr);
  switch(task.repeat_type){
    case 'daily': return true;
    case 'weekday': return wd<=5;
    case 'weekend': return wd>=6;
    case 'custom': return task.repeat_days.includes(wd);
    default: return true;
  }
}

// Tech-spec §1.4: Human-readable repeat label
function getRepeatLabel(t){
  switch(t.repeat_type){
    case 'daily': return '每天';
    case 'weekday': return '工作日（周一至周五）';
    case 'weekend': return '周末';
    case 'custom':{
      const names=['周一','周二','周三','周四','周五','周六','周日'];
      return t.repeat_days.map(d=>names[d-1]).join('、')||'自定义';
    }
    default: return '每天';
  }
}

// Tech-spec §1.4: Derive homeTasks from mgmtTasks + checkinsByDate
function getHomeTasks(dateStr){
  return mgmtTasks
    .filter(t=>!t.is_deleted && isActiveOnDate(t,dateStr))
    .map(t=>{
      const record=checkinsByDate[dateStr]?.[t.id];
      return {id:t.id,icon:t.icon,name:t.name,done:record?.done||false,backfill:record?.backfill||false};
    });
}

/* ========================================================================
   SECTION D: Persistence (localStorage)
   ======================================================================== */

const STORAGE_KEY='growth_sapling_v2';
const NICK_KEY='gs_nickname';
let userNickname='微信用户';

function saveToStorage(){
  const data={mgmtTasks,checkinsByDate,badges};
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch(e){}
}

function loadFromStorage(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const data=JSON.parse(raw);
    if(data.mgmtTasks) mgmtTasks=data.mgmtTasks;
    if(data.checkinsByDate) checkinsByDate=data.checkinsByDate;
    if(data.badges) badges=data.badges;
    return true;
  }catch(e){return false;}
}

// Generate demo seed data for first-time users (or after migration from old format)
function generateSeedData(){
  const y=TODAY.getFullYear(), m=TODAY.getMonth();
  const mk=(d)=>isoOf(new Date(y,m,d));
  // Generate demo data for days 1-10
  const demo=[];
  // All done, no backfill
  for(let d=1;d<=4;d++){ demo.push({d,allDone:true,hasBackfill:false}); }
  // Partial (2/4)
  demo.push({d:5,allDone:false,hasBackfill:false});
  // All done, no backfill
  demo.push({d:6,allDone:true,hasBackfill:false});
  // All done, with backfill
  for(let d=7;d<=9;d++){ demo.push({d,allDone:true,hasBackfill:true}); }
  // Partial (3/4)
  demo.push({d:10,allDone:false,hasBackfill:false});

  checkinsByDate={};
  demo.forEach(({d,allDone,hasBackfill})=>{
    const iso=mk(d);
    const activeTasks=DEFAULT_MGMT_TASKS.filter(t=>!t.is_deleted && isActiveOnDate(t,iso));
    checkinsByDate[iso]={};
    activeTasks.forEach((t,i)=>{
      const done=allDone?true:(t.id===1||t.id===4); // partial: default done=id 1,4
      const backfill=hasBackfill&&done&&(allDone?i===activeTasks.length-1:t.id===4);
      checkinsByDate[iso][t.id]={task_id:t.id,done,backfill,created_at:new Date(y,m,d,8,0,0).toISOString()};
    });
  });
}

// Migration from old aggregate structure {done,total,hasBackfill} to new fine-grained structure
function migrateData(){
  let needsMigration=false;
  for(const iso of Object.keys(checkinsByDate)){
    const day=checkinsByDate[iso];
    if(typeof day.done==='number'&&typeof day.total==='number'){
      needsMigration=true; break;
    }
  }
  if(needsMigration){
    generateSeedData();
    saveToStorage();
  }
}

/* ========================================================================
   SECTION E: Calculations
   ======================================================================== */

// Tech-spec §6.1: Total stars = all historical + today
function calcStars(){
  const todayIso=isoOf(TODAY);
  let s=0;
  Object.values(checkinsByDate).forEach((day,iso)=>{
    // 今日从 homeTasks 实时计算（避免重复计数），历史日累加 checkinsByDate
    if(iso===todayIso){
      s+=homeTasks.filter(t=>t.done).length;
    }else{
      s+=Object.values(day).filter(r=>r.done).length;
    }
  });
  // 如果今日 checkinsByDate 还没建立（首次打开），补充从 homeTasks 计数
  if(!checkinsByDate[todayIso]){
    s+=homeTasks.filter(t=>t.done).length;
  }
  return s;
}

// Tech-spec §6.2: Consecutive streak (natural day 00:00 reset)
function calcStreak(){
  let streak=0;
  const d=new Date(TODAY);
  while(true){
    const iso=isoOf(d);
    let doneCount;
    if(iso===isoOf(TODAY)){
      doneCount=homeTasks.filter(t=>t.done).length;
    }else{
      const day=checkinsByDate[iso];
      doneCount=day?Object.values(day).filter(r=>r.done).length:0;
    }
    if(doneCount===0) break;
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

// Tech-spec §6.3: Weekly completion rate (Mon-Sun)
function calcWeekRate(){
  const todayDow=TODAY.getDay(); // 0=Sun
  const weekStart=new Date(TODAY);
  weekStart.setDate(weekStart.getDate()-(todayDow===0?6:todayDow-1));
  let doneTotal=0, taskTotal=0;
  for(let i=0;i<7;i++){
    const d=new Date(weekStart);
    d.setDate(d.getDate()+i);
    const iso=isoOf(d);
    if(iso===isoOf(TODAY)){
      doneTotal+=homeTasks.filter(t=>t.done).length;
      taskTotal+=homeTasks.length;
    }else{
      const day=checkinsByDate[iso];
      if(day){
        const records=Object.values(day);
        doneTotal+=records.filter(r=>r.done).length;
        taskTotal+=records.length;
      }
    }
  }
  return taskTotal===0?0:Math.round(doneTotal/taskTotal*100);
}

// getCheckin: returns aggregate {done,total,hasBackfill} for a given date
function getCheckin(iso){
  if(iso===isoOf(TODAY)){
    return {done:homeTasks.filter(t=>t.done).length,total:homeTasks.length,
            hasBackfill:homeTasks.some(t=>t.backfill)};
  }
  if(homeTasksByDate[iso]){
    const arr=homeTasksByDate[iso];
    return {done:arr.filter(t=>t.done).length,total:arr.length,
            hasBackfill:arr.some(t=>t.backfill)};
  }
  const day=checkinsByDate[iso];
  if(!day) return {done:0,total:homeTasks.length,hasBackfill:false};
  const records=Object.values(day);
  return {done:records.filter(r=>r.done).length,total:records.length,
          hasBackfill:records.some(r=>r.backfill)};
}

function cellClassFor(iso){
  const c=getCheckin(iso);
  if(c.done===0) return 'c-none';
  if(c.done<c.total) return 'c-part';
  return 'c-done';
}

/* ========================================================================
   SECTION F: Badge Logic
   ======================================================================== */

function recalcBadges(){
  const stars=calcStars();
  const streak=calcStreak();
  const oldBadges={...badges};
  badges={};
  BADGE_DEFS.forEach(b=>{
    if(b.category==='stars') badges[b.type]=stars>=b.threshold;
    else if(b.category==='streak') badges[b.type]=streak>=b.threshold;
  });
  // Check for newly earned badges
  BADGE_DEFS.forEach(b=>{
    if(badges[b.type]&&!oldBadges[b.type]){
      setTimeout(()=>showBadgeAnimation(b),400);
    }
  });
}

function showBadgeAnimation(badge){
  document.getElementById('baIcon').textContent=badge.icon;
  document.getElementById('baText').textContent=`获得「${badge.name}」！`;
  document.getElementById('badgeAnimation').classList.add('show');
  setTimeout(()=>closeBadgeAnimation(),2000);
}
function closeBadgeAnimation(){
  document.getElementById('badgeAnimation').classList.remove('show');
}

/* ========================================================================
   SECTION G: Star Burst Animation
   ======================================================================== */

function spawnStars(cardEl){
  const rect=cardEl.getBoundingClientRect();
  const appRect=document.getElementById('app').getBoundingClientRect();
  const cx=rect.left-appRect.left+rect.width/2;
  const cy=rect.top-appRect.top+rect.height/2;
  const container=document.createElement('div');
  container.className='star-burst';
  container.style.left=cx+'px';
  container.style.top=cy+'px';
  for(let i=0;i<5;i++){
    const p=document.createElement('span');
    p.className='star-particle';
    p.textContent='⭐';
    p.style.setProperty('--dx',(Math.random()-0.5)*120+'px');
    p.style.setProperty('--dy',(Math.random()-0.5)*120+'px');
    container.appendChild(p);
  }
  document.getElementById('app').appendChild(container);
  setTimeout(()=>container.remove(),700);
}

/* ========================================================================
   SECTION H: Render Home
   ======================================================================== */

function renderHome(){
  const c=document.getElementById('pageHome');
  const vd=dateOfIso(viewDate);
  const isPast=vd<TODAY, isFuture=vd>TODAY, isToday=vd.getTime()===TODAY.getTime();

  if(isToday) homeTasks.forEach(t=>{t.backfill=false;}); // L1.4

  const doneCount=homeTasks.filter(t=>t.done).length;
  const streak=calcStreak();
  // 火焰状态：仅看当日是否有任务完成（无论今日还是历史日）
  const fireLit=homeTasks.some(t=>t.done);

  let h='';
  h+=`<div class="page-header"><div class="page-header-icon"><span>✅</span></div><div class="page-header-text"><div class="page-header-title">今日打卡</div><div class="page-header-subtitle">今天也要加油哦</div></div></div>`;
  h+=`<div class="home-header">
    <div class="streak-fire"><span class="fire-icon ${fireLit?'lit':''}">${fireLit?'🔥':'🪵'}</span><span>${streak}</span></div>
    <div class="star-count">⭐ ${calcStars()}</div>
    <div class="date-display" onclick="openCal()"><span>${fmtDate(vd)}</span><span>📅</span></div>
  </div>`;
  if(isFuture){
    h+=`<div class="backfill-banner show">⏰ 不要着急，到这天了才可以打卡哦 <span class="banner-back" onclick="goBackToday()">回到今天</span></div>`;
  }else{
    h+=`<div class="backfill-banner ${isPast?'show':''}">📅 补卡模式 · ${fmtDate(vd)}</div>`;
  }

  if(isFuture){
    h+=`<div class="empty-state"><div class="squirrel">🐿️</div><div class="empty-title">这一天还没到哦</div><div class="empty-sub">${fmtDate(vd)} 是未来，先安排好任务吧～</div></div>`;
  }else if(homeTasks.length===0){
    const hasAnyTask=mgmtTasks.filter(t=>!t.is_deleted).length>0;
    if(hasAnyTask){
      h+=`<div class="empty-state"><div class="squirrel">🐿️</div><div class="empty-title">今天没有安排任务</div><div class="empty-sub">好好休息吧～</div></div>`;
    }else{
      h+=`<div class="empty-state"><div class="squirrel">🐿️</div><div class="empty-title">来添加你的第一个任务吧！</div><div class="empty-sub">果果陪你一起打卡哦～</div><button class="btn-primary" onclick="switchTab('tasks')">去添加任务</button></div>`;
    }
  }else{
    h+=`<div class="task-list">`;
    homeTasks.forEach(t=>{
      h+=`<div class="task-card ${t.done?'completed':''} ${t.backfill?'backfill':''}" data-task-id="${t.id}" onclick="onTaskClick(${t.id})">
        ${t.backfill?'<div class="backfill-tag">补</div>':''}
        <span class="task-icon">${t.icon}</span>
        <span class="task-name">${escapeHtml(t.name)}</span>
        <span class="task-status">${t.done?'✓':''}</span>
      </div>`;
    });
    h+=`</div>`;
    const cnt=homeTasks.filter(t=>t.done).length;
    const pct=Math.round(cnt/homeTasks.length*100);
    h+=`<div class="progress-wrap"><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-text">已完成 ${cnt}/${homeTasks.length}</div></div>`;
  }
  c.innerHTML=h;
}

/* ========================================================================
   SECTION I: Task Click (Check-in / Undo)
   ======================================================================== */

function onTaskClick(id){
  const vd=dateOfIso(viewDate);
  if(vd>TODAY) return; // L5: future dates disabled
  const t=homeTasks.find(x=>x.id===id); if(!t) return;

  if(t.done){
    // L3: Undo with confirmation
    const isBackfill=vd<TODAY;
    const verb=isBackfill?'补卡':'打卡';
    document.getElementById('confirmText').textContent=`确定撤销「${t.name}」的${verb}吗？`;
    document.getElementById('confirmOk').onclick=()=>{
      closeOverlay('confirmOverlay');
      t.done=false; t.backfill=false; // L1.3
      if(checkinsByDate[viewDate]) delete checkinsByDate[viewDate][id];
      if(checkinsByDate[viewDate]&&Object.keys(checkinsByDate[viewDate]).length===0) delete checkinsByDate[viewDate];
      saveSnapshot(viewDate);  // Always save snapshot after undo
      saveToStorage(); recalcBadges(); renderHome(); renderStats();
    };
    openOverlay('confirmOverlay');
  }else{
    // L4: Direct check-in
    t.done=true;
    const backfill=vd<TODAY;
    t.backfill=backfill; // L1.1 / L1.2
    // Write to fine-grained checkinsByDate
    if(!checkinsByDate[viewDate]) checkinsByDate[viewDate]={};
    checkinsByDate[viewDate][id]={task_id:id,done:true,backfill,created_at:new Date().toISOString()};
    // Always save snapshot for data consistency
    saveSnapshot(viewDate);

    // Star burst animation
    const card=document.querySelector(`.task-card[data-task-id="${id}"]`);
    if(card) spawnStars(card);

    saveToStorage(); recalcBadges();
    renderHome(); renderStats();
    showToast(backfill?'补卡成功！⭐+1':'打卡成功！⭐+1');

    // L10: Celebration only for today
    if(homeTasks.length>0&&homeTasks.every(x=>x.done)&&vd.getTime()===TODAY.getTime()){
      setTimeout(showCelebration,500);
    }
  }
}

function showCelebration(){document.getElementById('celebration').classList.add('show');}
function closeCelebration(){document.getElementById('celebration').classList.remove('show');}

/* ========================================================================
   SECTION J: Render Stats
   ======================================================================== */

function renderStats(){
  const c=document.getElementById('pageStats');
  const y=TODAY.getFullYear(), m=TODAY.getMonth();
  const streak=calcStreak();
  const weekRate=calcWeekRate();

  // Calendar grid
  let grid='';for(let i=0;i<7;i++)grid+=`<div class="cal-head">${['日','一','二','三','四','五','六'][i]}</div>`;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  for(let i=0;i<first;i++)grid+=`<div class="cal-cell c-empty"></div>`;
  for(let d=1;d<=days;d++){
    const day=new Date(y,m,d);
    if(day>TODAY){grid+=`<div class="cal-cell c-empty">${d}</div>`;}
    else{
      const iso=isoOf(new Date(y,m,d));
      const ck=getCheckin(iso);
      const cls=cellClassFor(iso);
      const mark=(ck.done>=ck.total&&ck.hasBackfill)?'<span class="bf-mark">补</span>':'';
      grid+=`<div class="cal-cell ${cls}" onclick="pickDate(${d})">${d}${mark}</div>`;
    }
  }

  // Badge wall
  const stars=calcStars();
  let badgesHtml='';
  BADGE_DEFS.forEach(b=>{
    const earned=!!badges[b.type];
    let prog='';
    if(!earned){
      const val=b.category==='stars'?stars:streak;
      const remain=b.threshold-val;
      prog=`<div class="badge-prog">${remain>0?'还差'+remain+(b.category==='stars'?'颗星':'天'):''}</div>`;
    }else{
      prog=`<div class="badge-prog">已获得</div>`;
    }
    badgesHtml+=`<div class="badge ${earned?'earned':'locked'}">
      <div class="badge-icon">${b.icon}</div><div class="badge-name">${b.name}</div>${prog}</div>`;
  });
  // Add reserved slot
  badgesHtml+=`<div class="badge locked badge-reserved"><div class="badge-icon">🔒</div><div class="badge-name">敬请期待</div></div>`;

  c.innerHTML=`<div class="page-header"><div class="page-header-icon"><span>🌱</span></div><div class="page-header-text"><div class="page-header-title">我的成长</div><div class="page-header-subtitle">小树苗在长大</div></div></div>
    <div class="user-card" onclick="editNickname()">
      <div class="user-avatar">🌱</div>
      <div class="user-meta"><div class="user-name">${escapeHtml(userNickname)}</div><div class="user-hint">点击修改用户名</div></div>
      <div class="user-chevron">›</div>
    </div>
    <div class="streak-block"><div class="streak-num">🔥 ${streak} <span class="streak-unit">天</span></div><div class="streak-label">连续打卡</div></div>
    <div class="card"><div class="card-title">本周完成率</div><div class="ring-wrap">
      <div class="ring" style="background:conic-gradient(var(--green) 0% ${weekRate}%, #EFE7DC ${weekRate}% 100%);"><div class="ring-inner">${weekRate}%</div></div>
      <div class="ring-desc">这一周你完成得<br>很棒，继续保持！</div></div></div>
    <div class="card"><div class="card-title">打卡日历</div><div class="cal-month">${y}年${m+1}月</div><div class="cal-grid">${grid}</div></div>
    <div class="card"><div class="card-title">🏅 徽章墙</div><div class="badge-grid">${badgesHtml}</div></div>`;
}

/* ========================================================================
   SECTION K: Render Tasks (Management)
   ======================================================================== */

function renderTasks(){
  const c=document.getElementById('pageTasks');
  const activeTasks=mgmtTasks.filter(t=>!t.is_deleted);
  const atLimit=activeTasks.length>=6;
  let h=`<div class="page-header"><div class="page-header-icon"><span>📝</span></div><div class="page-header-text"><div class="page-header-title">我的任务</div><div class="page-header-subtitle">我想养成这些好习惯</div></div></div>`;
  if(activeTasks.length===0){
    h+=`<div class="empty-state" style="padding-top:var(--sp-8);"><div class="squirrel">🐿️</div><div class="empty-title">还没有任务哦</div><div class="empty-sub">点击下方按钮，添加你的第一个任务吧！</div></div>`;
  }else{
    h+=`<div class="task-mgmt-list">`;
    activeTasks.forEach(t=>{
      h+=`<div class="tm-card" onclick="openEditTask(${t.id})">
        <span class="tm-icon">${t.icon}</span>
        <div class="tm-info"><div class="tm-name">${escapeHtml(t.name)}</div>
        ${t.purpose?`<div class="tm-purpose">💭 ${escapeHtml(t.purpose)}</div>`:''}<div class="tm-repeat">${getRepeatLabel(t)}</div></div>
        <div class="tm-actions"><button class="tm-btn edit" onclick="event.stopPropagation();openEditTask(${t.id})">✏️</button>
        <button class="tm-btn del" onclick="event.stopPropagation();delTask(${t.id})">🗑</button></div>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`<button class="add-btn" ${atLimit?'disabled':''} onclick="openTask()">${atLimit?'最多添加6个任务哦～':'＋ 添加任务'}</button>`;
  c.innerHTML=h;
}

/* ========================================================================
   SECTION L: Task CRUD
   ======================================================================== */

function openEditTask(taskId){
  const t=mgmtTasks.find(x=>x.id===taskId);
  if(!t) return;
  editingTaskId=taskId;
  document.getElementById('taskFormTitle').innerHTML='编辑任务 <button class="sheet-close" onclick="closeOverlay(\'taskOverlay\')">✕</button>';
  document.getElementById('fName').value=t.name;
  document.getElementById('fWhy').value=t.purpose||'';
  selIcon=t.icon;
  // Render icon grid
  const ig=document.getElementById('iconGrid');ig.innerHTML='';
  ICONS.forEach((ic,i)=>{
    const b=document.createElement('div');
    b.className='icon-opt'+(ic===t.icon?' sel':'');
    b.textContent=ic;b.onclick=()=>{selIcon=ic;[...ig.children].forEach(x=>x.classList.remove('sel'));b.classList.add('sel');};
    ig.appendChild(b);
  });
  // Period
  document.querySelectorAll('#periodRow .period-opt').forEach(p=>p.classList.remove('sel'));
  const periodLabels={daily:'每天',weekday:'工作日',weekend:'周末',custom:'自定义'};
  const targetLabel=periodLabels[t.repeat_type]||'每天';
  const targetEl=[...document.querySelectorAll('#periodRow .period-opt')].find(p=>p.dataset.p===targetLabel);
  if(targetEl) targetEl.classList.add('sel');
  // Week row
  const weekRow=document.getElementById('weekRow');
  if(t.repeat_type==='custom'){
    weekRow.style.display='flex';
    [...weekRow.querySelectorAll('.week-opt')].forEach((w,i)=>{
      const wd=i+1; // 1=Mon..7=Sun
      w.classList.toggle('sel',t.repeat_days.includes(wd));
    });
  }else{weekRow.style.display='none';}
  openOverlay('taskOverlay');
}

function delTask(id){
  const t=mgmtTasks.find(x=>x.id===id);
  if(!t) return;
  document.getElementById('confirmText').textContent=`确定删除「${t.name}」吗？之前的打卡记录会留着哦～`;
  document.getElementById('confirmOk').onclick=()=>{
    t.is_deleted=true;
    closeOverlay('confirmOverlay');
    saveToStorage();
    renderTasks();
    renderHome();
    showToast('已删除');
  };
  openOverlay('confirmOverlay');
}

/* ========================================================================
   SECTION M: Task Form (Add/Edit)
   ======================================================================== */

let selIcon=ICONS[0];

function openTask(){
  editingTaskId=null;
  selIcon=ICONS[0];
  document.getElementById('taskFormTitle').innerHTML='添加任务 <button class="sheet-close" onclick="closeOverlay(\'taskOverlay\')">✕</button>';
  document.getElementById('fName').value='';document.getElementById('fWhy').value='';
  const ig=document.getElementById('iconGrid');ig.innerHTML='';
  ICONS.forEach((ic,i)=>{
    const b=document.createElement('div');
    b.className='icon-opt'+(i===0?' sel':'');
    b.textContent=ic;b.onclick=()=>{selIcon=ic;[...ig.children].forEach(x=>x.classList.remove('sel'));b.classList.add('sel');};
    ig.appendChild(b);
  });
  document.querySelectorAll('#periodRow .period-opt').forEach(p=>p.classList.remove('sel'));
  document.querySelector('#periodRow .period-opt').classList.add('sel');
  document.getElementById('weekRow').style.display='none';
  openOverlay('taskOverlay');
}

document.getElementById('periodRow').addEventListener('click',e=>{
  const p=e.target.closest('.period-opt');if(!p)return;
  document.querySelectorAll('#periodRow .period-opt').forEach(x=>x.classList.remove('sel'));
  p.classList.add('sel');
  document.getElementById('weekRow').style.display=p.dataset.p==='自定义'?'flex':'none';
});
document.getElementById('weekRow').addEventListener('click',e=>{
  const w=e.target.closest('.week-opt');if(!w)return;w.classList.toggle('sel');
});

function saveTask(){
  const name=document.getElementById('fName').value.trim();
  if(!name){showToast('请填写任务名称');return;}
  const purpose=document.getElementById('fWhy').value.trim();
  const perEl=document.querySelector('#periodRow .period-opt.sel');
  const perLabel=perEl.dataset.p;
  const typeMap={'每天':'daily','工作日':'weekday','周末':'weekend','自定义':'custom'};
  const repeat_type=typeMap[perLabel]||'daily';
  let repeat_days=[];
  if(repeat_type==='custom'){
    const weekNames=['周一','周二','周三','周四','周五','周六','周日'];
    repeat_days=[...document.querySelectorAll('#weekRow .week-opt.sel')].map(x=>weekNames.indexOf(x.textContent)+1);
    if(repeat_days.length===0){showToast('请选择至少一个工作日');return;}
  }

  if(editingTaskId){
    const t=mgmtTasks.find(x=>x.id===editingTaskId);
    if(t){
      t.name=name; t.purpose=purpose; t.icon=selIcon;
      t.repeat_type=repeat_type; t.repeat_days=repeat_days;
    }
    editingTaskId=null;
  }else{
    const activeCount=mgmtTasks.filter(t=>!t.is_deleted).length;
    if(activeCount>=6){showToast('最多添加6个任务哦～');return;}
    mgmtTasks.push({
      id:Date.now(), icon:selIcon, name, purpose,
      repeat_type, repeat_days,
      sort_order:mgmtTasks.length+1,
      is_deleted:false,
      created_at:new Date().toISOString()
    });
  }
  closeOverlay('taskOverlay');
  saveToStorage();
  renderTasks();
  renderHome();
  showToast(editingTaskId?'任务已更新 ✏️':'任务已添加 🌱');
}

/* ========================================================================
   SECTION N: Calendar & Date Picker
   ======================================================================== */

function openCal(){renderCal();openOverlay('calOverlay');}
function renderCal(){
  document.getElementById('calTitle').textContent=`${calYear}年${calMonth+1}月`;
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  let g='';for(let i=0;i<7;i++)g+=`<div class="cal-cell" style="font-weight:700;color:var(--text-secondary);font-size:10px;">${['日','一','二','三','四','五','六'][i]}</div>`;
  for(let i=0;i<first;i++)g+=`<div class="cal-cell"></div>`;
  const today=new Date();
  for(let d=1;d<=days;d++){
    const isFuture=new Date(calYear,calMonth,d)>today;
    const isToday=calYear===today.getFullYear()&&calMonth===today.getMonth()&&d===today.getDate();
    g+=`<div class="cal-cell ${isFuture?'future':'past'} ${isToday?'c-today':''}" ${isFuture?'':`onclick="pickDate(${d})"`}>${d}</div>`;
  }
  document.getElementById('calBig').innerHTML=g;
}
function shiftMonth(n){calMonth+=n;if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}renderCal();}

function pickDate(d){
  // Save current snapshot before switching
  if(viewDate!==isoOf(TODAY)) saveSnapshot(viewDate);
  viewDate=isoOf(new Date(calYear,calMonth,d));

  if(viewDate!==isoOf(TODAY)&&homeTasksByDate[viewDate]){
    loadSnapshot(viewDate);
  }else if(viewDate!==isoOf(TODAY)){
    // Rebuild from checkinsByDate fine-grained records
    const dayRecords=checkinsByDate[viewDate];
    homeTasks=mgmtTasks
      .filter(t=>!t.is_deleted&&isActiveOnDate(t,viewDate))
      .map(t=>{
        const record=dayRecords?.[t.id];
        return {id:t.id,icon:t.icon,name:t.name,done:record?.done||false,backfill:record?.backfill||false};
      });
    saveSnapshot(viewDate);
  }else{
    loadSnapshot(viewDate);
  }
  closeOverlay('calOverlay'); switchTab('home');
  showToast(viewDate===isoOf(TODAY)?'已回到今天的打卡页':`已跳转到 ${fmtDate(dateOfIso(viewDate))}`);
}

/* ========================================================================
   SECTION O: Tab / Overlay / Splash
   ======================================================================== */

function switchTab(tab){
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  if(tab==='home')renderHome(); if(tab==='stats')renderStats(); if(tab==='tasks')renderTasks();
}
function openOverlay(id){document.getElementById(id).classList.add('show');}
function closeOverlay(id){document.getElementById(id).classList.remove('show');}

function hideSplash(){document.getElementById('splash').classList.add('hide');}
setTimeout(hideSplash,1500);

function editNickname(){
  const name=prompt('修改用户名',userNickname);
  if(name===null) return;
  const trimmed=name.trim().slice(0,20);
  if(!trimmed) return;
  userNickname=trimmed;
  try{localStorage.setItem(NICK_KEY,trimmed);}catch(e){}
  renderStats();
  showToast('用户名已更新');
}

function goBackToday(){
  viewDate=isoOf(TODAY);
  renderHome();
}

/* ========================================================================
   SECTION P: Init
   ======================================================================== */

(function init(){
  const hasData=loadFromStorage();
  const nk=localStorage.getItem(NICK_KEY); if(nk) userNickname=nk;
  if(!hasData){
    // First-time: generate demo seed data
    generateSeedData();
    badges={};
    // Set today's default check-in state (task 1 & 4 done) for demo
    const todayIso=isoOf(TODAY);
    checkinsByDate[todayIso]={};
    DEFAULT_MGMT_TASKS.filter(t=>!t.is_deleted).forEach(t=>{
      checkinsByDate[todayIso][t.id]={task_id:t.id,done:(t.id===1||t.id===4),backfill:false,created_at:new Date().toISOString()};
    });
    saveToStorage();
  }else{
    migrateData(); // Handle old format migration
  }
  // Derive homeTasks for today
  homeTasks=getHomeTasks(isoOf(TODAY));
  saveSnapshot(isoOf(TODAY));
  recalcBadges();
  renderHome();
})();
</script>
